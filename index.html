<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Lover | Pure Ayurvedic Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;500&display=swap');
        .product-card { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .product-card:hover { transform: scale(1.08) rotate(2deg); box-shadow: 0 25px 50px -12px rgb(19 136 8); }
        .cart-modal { animation: slideUp 0.3s ease; }
    </style>
</head>
<body class="font-sans bg-gray-50">

<!-- NAVBAR -->
<nav class="bg-white border-b-4 border-[#FF9933] sticky top-0 z-50 shadow">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-[#138808] rounded-2xl flex items-center justify-center text-4xl">🌿</div>
            <h1 class="text-3xl font-bold text-[#138808]">Nature Lover</h1>
        </div>
        
        <div class="flex items-center gap-6 text-lg">
            <a href="#products" class="hover:text-[#FF9933]">Products</a>
            <a href="#" onclick="showCart()" class="flex items-center gap-2 relative">
                <i class="fa-solid fa-shopping-bag text-2xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-[#FF9933] text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
            </a>
        </div>
    </div>
</nav>

<!-- HERO -->
<section class="bg-gradient-to-r from-[#138808] to-[#FF9933] text-white py-16 text-center">
    <h1 class="text-5xl font-bold">Pure Ayurvedic Treasures</h1>
    <p class="mt-4 text-xl">Handcrafted in India • Shipping Worldwide</p>
    <div class="mt-8">
        <a href="#products" class="bg-white text-[#138808] px-10 py-4 rounded-3xl text-xl font-semibold inline-flex items-center gap-3">
            Shop Now <i class="fa-solid fa-arrow-right"></i>
        </a>
    </div>
</section>

<!-- PRODUCTS -->
<section id="products" class="max-w-7xl mx-auto px-6 py-12">
    <h2 class="text-center text-4xl font-bold text-[#138808] mb-10">Our Sacred Collection</h2>
    
    <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-8" id="product-grid">
        <!-- JS se products load honge -->
    </div>
</section>

<!-- CART MODAL -->
<div id="cart-modal" class="hidden fixed inset-0 bg-black/70 z-[9999] flex items-end md:items-center justify-center">
    <div class="bg-white w-full max-w-lg rounded-t-3xl md:rounded-3xl cart-modal p-6">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-bold">Your Cart</h3>
            <button onclick="hideCart()" class="text-3xl">✕</button>
        </div>
        <div id="cart-items"></div>
        <div class="mt-6 border-t pt-4 flex justify-between text-xl font-semibold">
            <span>Total</span>
            <span id="cart-total">₹0</span>
        </div>
        <button onclick="proceedToCheckout()" class="w-full bg-[#138808] text-white py-5 rounded-3xl text-xl mt-8">Proceed to Checkout</button>
        <button onclick="hideCart()" class="w-full text-gray-500 mt-4">Continue Shopping</button>
    </div>
</div>

<!-- CHECKOUT MODAL -->
<div id="checkout-modal" class="hidden fixed inset-0 bg-black/70 z-[10000] flex items-end md:items-center justify-center">
    <div class="bg-white w-full max-w-lg rounded-t-3xl md:rounded-3xl p-6">
        <h3 class="text-2xl font-bold mb-6">Checkout</h3>
        <form id="order-form" onsubmit="handleOrder(event)">
            <input type="text" id="name" placeholder="Full Name" required class="w-full border rounded-2xl px-5 py-4 mb-4">
            <input type="tel" id="phone" placeholder="Phone Number (with WhatsApp)" required class="w-full border rounded-2xl px-5 py-4 mb-4">
            <textarea id="address" placeholder="Full Address + Pincode" rows="3" required class="w-full border rounded-2xl px-5 py-4 mb-4"></textarea>
            <button type="submit" class="w-full bg-green-600 text-white py-5 rounded-3xl text-xl flex items-center justify-center gap-3">
                <i class="fa-brands fa-whatsapp text-3xl"></i>
                Send Order on WhatsApp
            </button>
        </form>
        <button onclick="hideCheckout()" class="w-full text-gray-500 mt-4">Back to Cart</button>
    </div>
</div>

<script>
    // Products data
    const products = [
        { id:1, name:"Pure Neem Tooth Stick (Datun)", price:499, unit:"pack", img:"https://picsum.photos/id/1015/800/600" },
        { id:2, name:"Organic Cow Dung Upla", price:999, unit:"5 pcs", img:"https://picsum.photos/id/1016/800/600" },
        { id:3, name:"100% Pure Cow Dung Ash", price:699, unit:"500g", img:"https://picsum.photos/id/133/800/600" },
        { id:4, name:"Pure Aloe Vera Gel", price:899, unit:"250g", img:"https://picsum.photos/id/201/800/600" },
        { id:5, name:"Pure A2 Desi Cow Ghee", price:1299, unit:"500g", img:"https://picsum.photos/id/1005/800/600" },
        { id:6, name:"Organic Haldi Powder", price:599, unit:"250g", img:"https://picsum.photos/id/133/800/600" },
        { id:7, name:"Ashwagandha Root Powder", price:999, unit:"200g", img:"https://picsum.photos/id/160/800/600" },
        { id:8, name:"Triphala Churna Powder", price:799, unit:"250g", img:"https://picsum.photos/id/201/800/600" }
    ];

    let cart = [];

    function renderProducts() {
        const container = document.getElementById('product-grid');
        container.innerHTML = '';
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card bg-white rounded-3xl overflow-hidden shadow-xl';
            card.innerHTML = `
                <div class="h-64 flex items-center justify-center bg-gradient-to-br from-green-50 to-emerald-100 p-8">
                    <img src="${p.img}" class="drop-shadow-2xl max-h-56">
                </div>
                <div class="p-6">
                    <h3 class="text-2xl font-semibold text-[#138808]">${p.name}</h3>
                    <p class="text-sm text-gray-500 mt-1">₹${p.price} / ${p.unit}</p>
                    <button onclick="addToCart(${p.id})" class="mt-6 w-full bg-[#138808] text-white py-4 rounded-3xl flex items-center justify-center gap-2">
                        <i class="fa-solid fa-cart-plus"></i> Add to Cart
                    </button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function addToCart(id) {
        const product = products.find(p => p.id === id);
        const existing = cart.find(item => item.id === id);
        if (existing) existing.qty++;
        else cart.push({...product, qty:1});
        
        updateCartCount();
        alert(`${product.name} added to cart!`);
    }

    function updateCartCount() {
        const count = cart.reduce((sum, item) => sum + item.qty, 0);
        document.getElementById('cart-count').textContent = count;
    }

    function showCart() {
        const modal = document.getElementById('cart-modal');
        const container = document.getElementById('cart-items');
        container.innerHTML = '';
        
        if (cart.length === 0) {
            container.innerHTML = `<p class="text-center py-12 text-gray-400">Cart is empty</p>`;
            modal.classList.remove('hidden');
            return;
        }
        
        let total = 0;
        cart.forEach((item, index) => {
            const itemTotal = item.price * item.qty;
            total += itemTotal;
            container.innerHTML += `
                <div class="flex justify-between items-center border-b py-4">
                    <div>
                        <div class="font-medium">${item.name}</div>
                        <div class="text-sm text-gray-500">₹${item.price} × ${item.qty}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-semibold">₹${itemTotal}</span>
                        <button onclick="removeFromCart(${index})" class="text-red-500">Remove</button>
                    </div>
                </div>
            `;
        });
        
        document.getElementById('cart-total').textContent = `₹${total}`;
        modal.classList.remove('hidden');
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        showCart();
        updateCartCount();
    }

    function hideCart() {
        document.getElementById('cart-modal').classList.add('hidden');
    }

    function proceedToCheckout() {
        hideCart();
        document.getElementById('checkout-modal').classList.remove('hidden');
    }

    function hideCheckout() {
        document.getElementById('checkout-modal').classList.add('hidden');
    }

    function handleOrder(e) {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const address = document.getElementById('address').value;
        
        let orderText = `🛒 *New Order - Nature Lover*\n\n`;
        orderText += `👤 Name: ${name}\n`;
        orderText += `📱 Phone: ${phone}\n`;
        orderText += `📍 Address: ${address}\n\n`;
        orderText += `🛍️ Items:\n`;
        
        let total = 0;
        cart.forEach(item => {
            const itemTotal = item.price * item.qty;
            total += itemTotal;
            orderText += `• ${item.name} × \( {item.qty} = ₹ \){itemTotal}\n`;
        });
        
        orderText += `\n💰 Total: ₹${total}\n`;
        orderText += `\n✅ Please confirm this order!`;
        
        // WhatsApp link
        const whatsappLink = `https://wa.me/919876543210?text=${encodeURIComponent(orderText)}`; 
        // ←←← YAHAN APNA NUMBER DAAL DO (91 ke saath, bina + ke)
        
        window.open(whatsappLink, '_blank');
        
        // Clear cart after order
        cart = [];
        updateCartCount();
        hideCheckout();
        alert('✅ Order sent on WhatsApp! Check your WhatsApp for confirmation.');
    }

    // Initialize
    window.onload = () => {
        renderProducts();
        updateCartCount();
    };
</script>
</body>
</html>
